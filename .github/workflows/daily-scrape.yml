name: Daily News Scrape

on:
  workflow_dispatch:
    inputs:
      force_window:
        description: "Bypass the 9AM New York schedule window for manual verification"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_SUMMARIZATION_MODEL: ${{ secrets.OPENAI_SUMMARIZATION_MODEL }}
      OPENAI_SOCIAL_MODEL: ${{ secrets.OPENAI_SOCIAL_MODEL }}
      SCHEDULER_TIMEZONE: America/New_York
      DAILY_RUN_HOUR: "9"
      DAILY_RUN_MINUTE: "0"
      RUN_ON_STARTUP: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run scheduled scrape
        working-directory: backend
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_window }}" = "true" ]; then
            python -m app.scheduled_scrape --force-window
          else
            python -m app.scheduled_scrape
          fi
